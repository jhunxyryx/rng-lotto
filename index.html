<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xyryx's Random Number Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f8ff;
            padding: 50px;
        }
        h1 { color: #333; }
        .box {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: inline-block;
            max-width: 500px;
        }
        .inputs {
            margin-bottom: 20px;
            padding: 15px;
            background-color: #e9ecef;
            border-radius: 10px;
        }
        .inputs label { font-weight: bold; margin-right: 10px; }
        .inputs input {
            width: 60px;
            padding: 5px;
            font-size: 16px;
            text-align: center;
            border: 2px solid #ccc;
            border-radius: 5px;
        }
        .numbers {
            font-size: 24px;
            font-weight: bold;
            color: #007bff;
            margin: 20px 0;
            letter-spacing: 5px;
        }
        .average {
            font-size: 20px;
            color: #28a745;
            margin-top: 10px;
        }
        /* NEW: Style for the Stats Box */
        .stats-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #fff3cd; /* Light yellow background */
            border: 2px solid #ffeeba;
            border-radius: 10px;
            font-size: 16px;
            color: #856404;
            line-height: 1.6;
        }
        .badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            color: white;
            margin-top: 15px;
        }
        .badge-math { background-color: #ffc107; color: #333; }
        .badge-crypto { background-color: #6f42c1; }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <div class="box">
        <h1>🎲 Number Generator</h1>
        
        <div class="inputs">
            <label>Max Number:</label>
            <input type="number" id="inputA1" value="42" min="2">
            <br>
            <label style="margin-left: 20px;">Half Count:</label>
            <input type="number" id="inputA2" value="3" min="1" max="5">
            
            <p style="font-size: 14px; color: #666; margin-top: 10px;">
                (This will generate <strong id="totalCountDisplay">6</strong> unique numbers)
            </p>
        </div>

        <div class="numbers" id="numberDisplay">- - - - - -</div>
        <div class="average" id="averageDisplay">Average: -</div>
        
        <!-- NEW: This is where our new stats will show up! -->
        <div class="stats-box" id="statsDisplay">
            Click Generate to see the stats!
        </div>

        <div id="generatorBadge" class="badge">Click Generate to start!</div>

        <br>
        <button onclick="generateAndShow()">Generate Numbers</button>
    </div>

    <script>
        // ==========================================
        // THIS IS THE JAVASCRIPT (The Brain of the page)
        // ==========================================

        document.getElementById("inputA2").addEventListener("input", function() {
            let a2Value = Number(this.value);
            if (a2Value > 5) {
                this.value = 5;
                a2Value = 5;
            }
            document.getElementById("totalCountDisplay").innerText = a2Value * 2;
        });

        function pickGeneratorMode() {
            const array = new Uint32Array(1);
            window.crypto.getRandomValues(array);
            return array[0] % 2; // Returns 0 or 1
        }

        function getNumber(min, max, mode) {
            if (mode === 0) {
                return Math.floor(Math.random() * (max - min + 1)) + min;
            } else {
                const array = new Uint32Array(1);
                window.crypto.getRandomValues(array);
                return min + (array[0] % (max - min + 1));
            }
        }

        function generateAndShow() {
            const A1 = Number(document.getElementById("inputA1").value);
            let A2 = Number(document.getElementById("inputA2").value);
            
            if (A2 > 5) {
                A2 = 5;
                document.getElementById("inputA2").value = 5;
            }
            
            const totalNumbers = A2 * 2;

            if (A1 < totalNumbers) {
                alert("Oops! The Max Number (A1) must be at least " + totalNumbers + " so we can pick " + totalNumbers + " unique numbers.");
                return;
            }

            const B1 = Math.trunc(A1 / 2); 
            const step = Math.round(A1 / (totalNumbers + 1)); 
            const B2 = B1 + step; 
            const B3 = B1 - step; 

            const mode = pickGeneratorMode();
            const badge = document.getElementById("generatorBadge");
            if (mode === 0) {
                badge.innerText = "🎲 Used: Math.random()";
                badge.className = "badge badge-math";
            } else {
                badge.innerText = "🔒 Used: Crypto (Secure)";
                badge.className = "badge badge-crypto";
            }

            let isValid = false;
            let numbers = [];
            let average = 0;
            
            // NEW: Start our retry counter at zero
            let retryCount = 0;

            // 4. Keep trying until we find a perfect match
            while (!isValid) {
                retryCount++; // Add 1 to the counter every time the loop runs!
                numbers = [];
                
                for (let i = 0; i < totalNumbers; i++) {
                    numbers.push(getNumber(1, A1, mode));
                }

                const uniqueNumbers = new Set(numbers);
                const allUnique = uniqueNumbers.size === totalNumbers;

                if (allUnique) {
                    const sum = numbers.reduce((total, currentNumber) => total + currentNumber, 0);
                    average = Math.round(sum / numbers.length);

                    if (average >= B3 && average <= B2) {
                        isValid = true; // We found a winner!
                    }
                }
            }

            // Sort the numbers from low to high
            numbers.sort((a, b) => a - b);

            // ==========================================
            // NEW: Calculate our Stats!
            // ==========================================
            let oddCount = 0;
            let evenCount = 0;
            let lowCount = 0;
            let highCount = 0;

            // Look at every number in our winning list
            for (let i = 0; i < numbers.length; i++) {
                let num = numbers[i];
                
                // 1. Check Odd vs Even
                // The "%" symbol gets the remainder. If a number divided by 2 has 0 remainder, it's even!
                if (num % 2 === 0) {
                    evenCount++;
                } else {
                    oddCount++;
                }

                // 2. Check Low vs High
                // We use B1 (the middle number) as the dividing line.
                if (num <= B1) {
                    lowCount++;
                } else {
                    highCount++;
                }
            }

            // 3. Update the webpage with all our new info!
            document.getElementById("numberDisplay").innerText = numbers.join(", ");
            document.getElementById("averageDisplay").innerText = "Average: " + average;
            
            // We use \n or <br> to make a new line in HTML
            document.getElementById("statsDisplay").innerHTML = 
                "🎯 <strong>Odds:</strong> " + oddCount + " | <strong>Evens:</strong> " + evenCount + "<br>" +
                "⚖️ <strong>Low:</strong> " + lowCount + " | <strong>High:</strong> " + highCount + "<br>" +
                "🔄 <strong>Retries:</strong> " + retryCount + " tries!";
        }
    </script>

</body>
</html>
